<body>
  <div class="overlay"></div>

  <div class="container">
    <h1>ARK</h1>

    <!-- … (deja aquí tus secciones existentes de redes, IA, videos, pagos, etc.) … -->

    <!-- VISOR 3D NATIVO -->
    <h2>Visor 3D</h2>
    <div id="viewer3d">
      <div id="model-status">
        Arrastra aquí un .glb/.gltf/.obj/.stl o usa “Cargar modelo 3D”
      </div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
      <!-- OJO: .glb está bien; .gbl NO existe -->
      <input type="file" id="modelInput" accept=".gltf,.glb,.obj,.stl" />
      <button onclick="cargarModelo3D()">Cargar modelo 3D</button>
      <button onclick="resetCamara3D()">Reset cámara</button>
      <button onclick="toggleFondo3D()">Fondo claro/oscuro</button>
    </div>
  </div>

  <!-- Tu JS principal SIEMPRE al final -->
  <script src="script.js"></script>
