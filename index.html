<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ark</title>

  <!-- Estilos principales -->
  <link rel="stylesheet" href="style.css" />

  <style>
    #map {
      width: 100%;
      height: 400px;
      margin-top: 10px;
      border-radius: 10px;
    }
    .error {
      color: #ff4a4a;
      font-weight: bold;
      margin-top: 10px;
    }
    /* Campo de correo (pequeño ajuste visual) */
    .pay-box {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      max-width: 420px;
      margin: 0 auto 20px;
      width: 100%;
    }
    .pay-box input[type="email"] {
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #b37b85;
      background: #fff7f7;
      color: #3b0c13;
      font-size: 16px;
    }
    .pay-actions {
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="container">
    <h1>ARK</h1>

    <!-- REDES -->
    <h2>Redes Sociales</h2>
    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Ver videos YouTube</button>
      <button onclick="cargarPostsFacebook()">Ver posts Facebook</button>
    </div>

    <div id="youtube-videos"></div>
    <div id="facebook-posts"></div>
    <p id="youtube-error" class="error"></p>
    <p id="facebook-error" class="error"></p>

    <!-- 2FA -->
    <h2>Verificación en 2 pasos</h2>
    <input type="text" id="codigo" placeholder="Ingresa código" />
    <button onclick="verificarCodigo()">Verificar</button>
    <p id="verificacion-msg"></p>

    <!-- MAPA -->
    <h2>Mapa</h2>
    <div id="map"></div>
    <p id="map-error" class="error"></p>

    <!-- IA -->
    <h2>Chat IA sobre Dinosaurios</h2>
    <input type="text" id="pregunta" placeholder="Pregunta sobre dinosaurios" />
    <button onclick="preguntarIA()">Preguntar</button>
    <p id="respuesta"></p>

    <!-- ===================== -->
    <!-- REPRODUCTOR PRINCIPAL -->
    <!-- ===================== -->
    <h2>Reproductor</h2>

    <div class="player">
      <div class="player-wrap">
        <video id="main-video" controls playsinline preload="metadata" src=""></video>

        <div class="player-overlay">
          <span id="main-filename">Selecciona un video…</span>
        </div>
      </div>

      <div class="player-meta">
        <div id="main-extra"></div>
      </div>
    </div>

    <!-- ===================== -->
    <!-- PAGOS (Stripe Checkout) -->
    <!-- ===================== -->
    <h2>Apoyar el proyecto</h2>
    <p style="text-align:center; margin: 0 0 10px;">
      Si te gusta este proyecto, puedes apoyar con una donación. 🙌
    </p>

    <!-- Campo de correo para enviar ticket al hacer clic -->
    <div class="pay-box">
      <input
        type="email"
        id="buyerEmail"
        placeholder="Tu correo (para enviarte el ticket)"
        required
        autocomplete="email"
      />
      <div class="pay-actions">
        <button onclick="pagar()">💳 Pagar $12 MXN</button>
      </div>
    </div>

    <!-- STREAMING -->
    <h2>Mis Videos (Streaming)</h2>

    <form id="uploadForm" enctype="multipart/form-data">
      <label>Subir video MP4/WEBM/OGG:</label>
      <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg" required />
      <button type="submit">Subir video</button>
      <p id="upload-status"></p>
    </form>

    <div>
      <button id="refreshBtn" type="button">Actualizar lista</button>
    </div>

    <div id="videos-grid"></div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>

  <!-- Google Maps -->
  <script>
    function gm_authFailure() {
      document.getElementById("map-error").innerText =
        "Error: API Key inválida o dominio no autorizado en Google Maps.";
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFOwFuxoNRk3NDmSTeui88vUY1nCnLTFI&callback=initMap">
  </script>

</body>
</html>
