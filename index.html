<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Proyecto ARK</title>

  <!-- Tu hoja de estilos -->
  <link rel="stylesheet" href="style.css" />

  <!-- Mapbox GL CSS (solo estilos internos del visor del mapa) -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
</head>
<body>
  <!-- Fondo + capa oscura de tu theme -->
  <div class="overlay"></div>

  <!-- Contenedor principal con TU estilo -->
  <div class="container">
    <h1>Proyecto ARK</h1>

    <!-- ==========================
         Pago con Stripe (NUEVO)
    =========================== -->
    <h2>Apoyar el proyecto</h2>
    <input id="buyerEmail" type="email" placeholder="Tu correo" required />
    <button onclick="pagar()">💳 Pagar $12 MXN</button>

    <!-- ==========================
         Player principal + meta
    =========================== -->
    <h2>Reproductor</h2>
    <div class="player">
      <div class="player-wrap">
        <video id="main-video" controls playsinline></video>
        <div class="player-overlay">
          <div id="main-filename">Selecciona un video</div>
        </div>
      </div>
      <div class="player-meta">
        <span id="main-extra"></span>
      </div>
    </div>

    <!-- ==========================
         Subida de video (R2/S3)
    =========================== -->
    <h2>Subir video</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg" required />
      <button type="submit">Subir video</button>
      <p id="upload-status"></p>
    </form>
    <button id="refreshBtn">Actualizar lista</button>

    <!-- ==========================
         Grid de videos
    =========================== -->
    <h2>Videos</h2>
    <div id="videos-grid"></div>

    <!-- ==========================
         Mapa Google (2D)
         (si no lo usas, puedes ocultarlo con CSS)
    =========================== -->
    <h2>Mapa (Google 2D)</h2>
    <div id="map"></div>
    <p id="map-error" class="muted"></p>

    <!-- ==========================
         Mapa 3D (Mapbox GL)
    =========================== -->
    <h2>Mapa 3D</h2>
    <div id="map3d" aria-label="Mapa 3D"></div>

    <!-- ==========================
         Redes (opcional)
    =========================== -->
    <h2>Últimos videos de YouTube</h2>
    <div id="youtube-error" class="muted"></div>
    <div id="youtube-videos"></div>

    <h2>Últimos posts de Facebook</h2>
    <div id="facebook-error" class="muted"></div>
    <div id="facebook-posts"></div>

    <!-- ==========================
         (opcional) 2FA simple + IA
         Solo si en tu script.js ya lo usas
    =========================== -->
    <h2>Verificación simple</h2>
    <input id="codigo" type="text" placeholder="Ingresa código" />
    <button onclick="verificarCodigo()">Verificar</button>
    <div id="verificacion-msg"></div>

    <h2>Preguntar a la IA (Dinosaurios)</h2>
    <input id="pregunta" type="text" placeholder="Escribe tu pregunta" />
    <button onclick="preguntarIA()">Preguntar</button>
    <div id="respuesta"></div>
  </div>

  <!-- ==========================
       Librerías originales
       (se conservan tal cual)
  =========================== -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

  <!-- Tu lógica (Stripe, R2, YouTube, Facebook, Mapbox, Google Maps init, etc.) -->
  <script src="script.js" defer></script>

  <!-- Google Maps (si lo usas) -->
  <!-- Reemplaza TU_GOOGLE_MAPS_API_KEY por tu key real; el callback llama a window.initMap definido en script.js -->
  <script src="https://maps.googleapis.com/maps/api/js?key=TU_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
</body>
</html>
