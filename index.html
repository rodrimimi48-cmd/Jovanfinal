<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARK</title>

  <!-- Estilos principales -->
  <link rel="stylesheet" href="style.css" />
  <!-- Mapbox GL JS (CSS) -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:#222; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    #map, #map3d { width: 100%; height: 400px; margin-top: 10px; border-radius: 10px; }
    .error { color: #ff4a4a; font-weight: bold; margin-top: 10px; }
    .social-buttons { display:flex; gap:8px; margin-bottom:6px; }

    .player { margin-top: 8px; display:grid; gap:8px; }
    .player-wrap { position: relative; border-radius: 10px; overflow: hidden; background:#000; }
    .player-wrap video { width:100%; height:auto; display:block; background:#000; }
    .player-overlay { position:absolute; left:10px; bottom:10px; background:rgba(0,0,0,.6); color:#fff; padding:6px 10px; border-radius:8px; font-size:12px;}
    .player-meta { color:#444; font-size:14px; }

    /* Grid de videos */
    #videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
    .video-card { border:1px solid #eee; border-radius:12px; overflow:hidden; background:#fff; box-shadow: 0 2px 6px rgba(0,0,0,0.05); cursor: pointer; }
    .video-wrap { position:relative; background:#000; }
    .video-wrap video { display:block; width:100%; height:auto; background:#000; }
    .play-badge { position:absolute; right:10px; bottom:10px; color:#fff; width:48px; height:48px; opacity:.9; }
    .play-badge svg { width:100%; height:100%; }
    .video-overlay { position:absolute; left:10px; bottom:10px; background:rgba(0,0,0,.6); color:#fff; padding:6px 10px; border-radius:8px; font-size:12px; max-width:80%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .video-meta { padding:10px; font-size: 13px; color:#444; display:flex; justify-content: space-between; gap:10px; flex-wrap:wrap; }
    .video-filename { font-weight:600; }

    .social-embed .video { margin: 10px 0; }
    .social-embed iframe { width: 100%; aspect-ratio: 16/9; border: 0; border-radius: 10px; }
    .fb-post { border:1px solid #eee; border-radius:10px; padding:10px; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>ARK</h1>

    <!-- REDES -->
    <h2>Redes Sociales</h2>
    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Ver videos YouTube</button>
      <button onclick="cargarPostsFacebook()">Ver posts Facebook</button>
    </div>
    <div id="youtube-videos" class="social-embed"></div>
    <div id="facebook-posts" class="social-embed"></div>
    <p id="youtube-error" class="error"></p>
    <p id="facebook-error" class="error"></p>

    <!-- 2FA -->
    <h2>Verificación en 2 pasos</h2>
    <input type="text" id="codigo" placeholder="Ingresa código" />
    <button onclick="verificarCodigo()">Verificar</button>
    <p id="verificacion-msg"></p>

    <!-- MAPA (Google Maps 2D) -->
    <h2>Mapa</h2>
    <div id="map"></div>
    <p id="map-error" class="error"></p>

    <!-- IA -->
    <h2>Chat IA sobre Dinosaurios</h2>
    <input type="text" id="pregunta" placeholder="Pregunta sobre dinosaurios" />
    <button onclick="preguntarIA()">Preguntar</button>
    <p id="respuesta"></p>

    <!-- REPRODUCTOR PRINCIPAL -->
    <h2>Reproductor</h2>
    <div class="player">
      <div class="player-wrap">
        <video id="main-video" controls playsinline preload="metadata"></video>
        <div class="player-overlay">
          <span id="main-filename">Selecciona un video…</span>
        </div>
      </div>
      <div class="player-meta">
        <div id="main-extra"></div>
      </div>
    </div>

    <!-- PAGOS -->
    <h2>Apoyar el proyecto</h2>
    <p style="text-align:center; margin: 0 0 10px;">
      Si te gusta este proyecto, puedes apoyar con una donación. 🙌
    </p>
    <!-- CORREO -->
    <input id="buyerEmail" type="email" placeholder="Tu correo para enviarte el ticket" required />
    <div style="display:flex; justify-content:center; margin-bottom: 20px;">
      <button onclick="pagar()">💳 Pagar $12 MXN</button>
    </div>

    <!-- STREAMING -->
    <h2>Mis Videos (Streaming)</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <label>Subir video MP4/WEBM/OGG:</label>
      <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg" required />
      <button type="submit">Subir video</button>
      <p id="upload-status"></p>
    </form>
    <button id="refreshBtn" type="button">Actualizar lista</button>
    <div id="videos-grid"></div>

    <!-- MAPA 3D (Mapbox GL JS) -->
    <h2>Mapa 3D</h2>
    <div id="map3d"></div>
  </div>

  <!-- JS PRINCIPAL -->
  <script src="script.js"></script>

  <!-- Mapbox GL JS (JS) -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

  <!-- Google Maps (tu mapa 2D de siempre) -->
  <script>
    function gm_authFailure() {
      document.getElementById("map-error").innerText =
        "Error: API Key inválida o dominio no autorizado en Google Maps.";
    }
  </script>
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=TU_GOOGLE_MAPS_API_KEY&callback=initMap">
  </script>
</body>
</html>
