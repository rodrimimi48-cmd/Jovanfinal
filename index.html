<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Web Completo</title>
  <link rel="stylesheet" href="style.css">

  <style>
    #map {
      width: 100%;
      height: 400px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="container">
    <h1>Proyecto con APIs y Chat de Dinosaurios</h1>

    <!-- REDES -->
    <h2>Redes Sociales</h2>
    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Ver videos YouTube</button>
      <button onclick="cargarPostsFacebook()">Ver posts Facebook</button>
    </div>

    <div id="youtube-videos"></div>
    <div id="facebook-posts"></div>

    <p id="youtube-error" class="error"></p>
    <p id="facebook-error" class="error"></p>

    <!-- 2FA -->
    <h2>Verificación en 2 pasos</h2>
    <input type="text" id="codigo" placeholder="Ingresa código">
    <button onclick="verificarCodigo()">Verificar</button>
    <p id="verificacion-msg"></p>

    <!-- MAPA -->
    <h2>Mapa</h2>
    <div id="map"></div>
    <p id="map-error" class="error"></p>

    <!-- IA -->
    <h2>Chat IA sobre Dinosaurios</h2>
    <input type="text" id="pregunta" placeholder="Pregunta sobre dinosaurios">
    <button onclick="preguntarIA()">Preguntar</button>
    <p id="respuesta"></p>
  </div>

  <script src="script.js"></script>

  <!-- Google Maps -->
  <script>
    function gm_authFailure() {
      document.getElementById("map-error").innerText =
        "Error: API Key inválida o dominio no autorizado en Google Maps.";
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=TU_MAPS_KEY&callback=initMap">
  </script>
</body>
</html>
